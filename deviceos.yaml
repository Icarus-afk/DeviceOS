# DeviceOS Configuration
#
# All values can also be set via environment variables (prefixed with DEVICEOS_).
# Env vars override values in this file.
#
# Usage:
#   ./bin/deviceos start                    # uses this file
#   ./bin/deviceos start --config deviceos.yaml
#
# See config/examples/ for alternative environment configs:
#   config/examples/deviceos.dev.yaml      # dev (explicit paths)
#   config/examples/deviceos.minimal.yaml  # bare minimum
#   config/examples/deviceos.prod.yaml     # hardened production

server:
  host: "0.0.0.0"
  port: 8080

sparkdb:
  bin_path: "./bin/sparkdb"
  host: "127.0.0.1"
  port: 9600
  database: "deviceos"
  data_dir: "./data/sparkdb"
  api_key: ""
  auth: false
  extra_config: {}

modules:
  jwt_secret: "dev-change-me-in-production"
  admin_api_key: "dos_dev_admin_token_0001"
